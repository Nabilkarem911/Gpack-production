<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.PACK - إدارة المهام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="gpack-theme.css">
</head>

<body class="flex h-screen overflow-hidden bg-gray-100">

    <div id="sidebar-container"></div>
    <div id="header-container" class="hidden"></div>

    <script src="config.js"></script>
    <script src="core.js"></script>
    <script src="layout.js"></script>

    <main class="flex-1 flex flex-col overflow-hidden relative w-full transition-all duration-300">
        <header class="h-20 bg-white shadow-sm flex items-center justify-between px-4 md:px-8 z-10 shrink-0">
            <div class="flex items-center gap-3 shrink-0">
                <button onclick="if(typeof toggleSidebar === 'function') toggleSidebar()"
                    class="text-gray-600 text-xl focus:outline-none hover:text-purple-800 p-2 rounded-md hover:bg-gray-100 md:hidden">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 class="text-lg md:text-xl font-bold text-gray-800 whitespace-nowrap">إدارة المهام والتكليفات</h2>
                <div id="loadingIndicator"
                    class="hidden flex items-center gap-2 text-sm text-purple-600 bg-purple-50 px-3 py-1 rounded-full">
                    <i class="fas fa-sync fa-spin"></i></div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.openNewTaskModal()"
                    class="gpack-btn px-4 py-2 rounded-lg font-bold text-sm shadow-md flex items-center gap-2">
                    <i class="fas fa-plus"></i><span class="hidden md:inline">مهمة جديدة</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="tasksGrid">
            </div>
        </div>
    </main>

    <div id="taskModal"
        class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 transition-opacity">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50" onclick="closeModal('taskModal')">
        </div>
        <div
            class="modal-container bg-white w-11/12 md:max-w-lg mx-auto rounded-2xl shadow-lg z-50 p-6 transform transition-transform scale-95">
            <h3 class="font-bold text-xl mb-4 text-purple-800">إضافة مهمة جديدة</h3>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="currentTaskId">
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-700">عنوان المهمة</label>
                    <input type="text" id="tTitle"
                        class="w-full border border-gray-300 rounded p-2 focus:border-purple-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-700">التفاصيل</label>
                    <textarea id="tDesc"
                        class="w-full border border-gray-300 rounded p-2 focus:border-purple-500 outline-none"
                        rows="3"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-700">تعيين إلى (الموظف)</label>
                        <select id="tAssign" class="w-full border border-gray-300 rounded p-2 bg-white"
                            required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-700">تاريخ التسليم</label>
                        <input type="date" id="tDate" class="w-full border border-gray-300 rounded p-2" required>
                    </div>
                </div>
                <div class="mt-6 border-t border-gray-200 pt-5"> 
                    <h4 class="text-sm font-bold text-gray-800 mb-3 text-purple-700">المهام الفرعية للتكليف (Checklist)</h4> 
                    <div class="flex gap-2 mb-3"> 
                        <input type="text" id="newSubtaskTitle" class="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none focus:border-purple-500 bg-white" placeholder="اكتب مهمة فرعية (مثال: استلام العينات...)"> 
                        <button type="button" onclick="window.addSubtask(event)" class="bg-purple-100 text-purple-700 px-4 py-2 rounded-lg font-bold hover:bg-purple-200 transition shrink-0"><i class="fas fa-plus"></i></button> 
                    </div> 
                    <div id="subtasksList" class="bg-gray-50 border rounded-lg p-2 max-h-48 overflow-y-auto shadow-inner"> 
                        <p class="text-xs text-gray-500 text-center py-3">يرجى حفظ التكليف الرئيسي أولاً لتتمكن من إضافة مهام فرعية.</p> 
                    </div> 
                </div> 
                <div class="pt-4 border-t flex justify-end gap-2 mt-4">
                    <button type="button" onclick="closeModal('taskModal')"
                        class="bg-gray-100 px-4 py-2 rounded text-gray-700 font-bold hover:bg-gray-200">إلغاء</button>
                    <button type="submit" id="saveBtn" class="gpack-btn px-6 py-2 rounded font-bold">حفظ
                        التكليف</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let employeesList = [];
        let tasksList = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try { if (typeof injectLayout === 'function') injectLayout(); } catch (e) { console.warn("Layout init skipped", e); }

            document.getElementById('loadingIndicator').classList.remove('hidden');
            try {
                await fetchEmployeesForDropdown();
                await fetchTasks();
                
                // --- DEEP LINKING LOGIC --- 
                const urlParams = new URLSearchParams(window.location.search); 
                const autoOpenId = urlParams.get('openTask'); 
                
                if (autoOpenId) { 
                    // Clean the URL so refreshing doesn't keep opening the modal 
                    window.history.replaceState({}, document.title, window.location.pathname); 
                    
                    // Wait a tiny bit for the DOM and data to be fully ready 
                    setTimeout(() => { 
                        // Try to open the Employee details/chat view first 
                        if (typeof window.openTaskDetails === 'function') { 
                            window.openTaskDetails(autoOpenId); 
                        } 
                        // Fallback to Admin edit view if details view isn't available 
                        else if (typeof window.openTaskModal === 'function') { 
                            window.openTaskModal(autoOpenId); 
                        } 
                    }, 300); 
                } 
                // --------------------------
            } catch (error) {
                console.error("Initialization Error:", error);
            } finally {
                document.getElementById('loadingIndicator').classList.add('hidden');
            }
        });

        async function fetchEmployeesForDropdown() {
            const { data, error } = await window.supabaseClient.from('employees').select('id, full_name').eq('status', 'active');
            if (error) { console.error("Error fetching employees:", error); return; }
            employeesList = data || [];

            const select = document.getElementById('tAssign');
            select.innerHTML = '<option value="">-- اختر الموظف --</option>';
            employeesList.forEach(emp => {
                select.innerHTML += `<option value="${emp.id}">${emp.full_name}</option>`;
            });
        }

        window.getEmployeeName = function(id) { 
            if (!id) return 'لم يتم التعيين'; 
            const select = document.getElementById('tAssign'); 
            if (!select) return id; 
            const option = Array.from(select.options).find(opt => String(opt.value) === String(id)); 
            return option ? option.text : 'غير محدد'; 
        }; 

        async function fetchTasks() {
            const { data, error } = await window.supabaseClient
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching tasks:", error);
                return;
            }

            tasksList = (data || []).map(task => {
                const emp = employeesList.find(e => String(e.id) === String(task.assigned_to));
                task.employee_name = emp ? emp.full_name : 'غير محدد';
                return task;
            });

            renderTasks();
        }

        function renderTasks() {
            const grid = document.getElementById('tasksGrid');
            grid.innerHTML = '';

            if (tasksList.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center p-8 text-gray-400"><i class="fas fa-tasks text-4xl mb-2"></i><p>لا توجد مهام حالياً</p></div>';
                return;
            }

            const today = new Date().setHours(0, 0, 0, 0);

            tasksList.forEach(task => {
                const isCompleted = task.status === 'completed';
                const taskDate = new Date(task.due_date).setHours(0, 0, 0, 0);
                const isOverdue = !isCompleted && taskDate < today;

                let cardClass = "bg-white border-gray-200";
                let statusBadge = `<span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded font-bold"><i class="fas fa-clock"></i> قيد التنفيذ</span>`;

                if (isCompleted) {
                    cardClass = "bg-green-50 border-green-200 opacity-80";
                    statusBadge = `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold"><i class="fas fa-check-double"></i> مكتملة</span>`;
                } else if (isOverdue) {
                    cardClass = "bg-red-50 border-red-300";
                    statusBadge = `<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded font-bold animate-pulse"><i class="fas fa-exclamation-circle"></i> متأخرة</span>`;
                }

                grid.innerHTML += ` 
                    <div class="${cardClass} border rounded-xl p-5 shadow-sm hover:shadow-md transition flex flex-col relative cursor-pointer" onclick="openTaskDetails('${task.id}')"> 
                        <div class="flex justify-between items-start mb-2"> 
                            <h3 class="font-bold text-lg text-gray-800 line-clamp-1" title="${task.title}">${task.title}</h3> 
                            ${statusBadge} 
                        </div> 
                        <p class="text-sm text-gray-600 mb-4 line-clamp-2 flex-1">${task.description || 'لا توجد تفاصيل.'}</p> 
                        
                        <div class="flex items-center justify-between text-xs text-gray-500 mb-4 bg-white/50 p-2 rounded"> 
                            <div class="flex items-center gap-1 font-bold text-purple-700"><i class="fas fa-user-circle"></i> ${window.getEmployeeName(task.assigned_to)}</div> 
                            <div class="flex items-center gap-1 ${isOverdue ? 'text-red-600 font-bold' : ''}"><i class="fas fa-calendar-alt"></i> ${task.due_date}</div> 
                        </div> 

                        <div class="flex justify-between items-center pt-3 border-t border-gray-200/60 mt-auto"> 
                            <div class="flex items-center gap-2">
                                <button onclick="event.stopPropagation(); editTask('${task.id}')" class="text-indigo-400 hover:text-indigo-600"><i class="fas fa-edit"></i></button> 
                                <button onclick="event.stopPropagation(); deleteTask('${task.id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button> 
                            </div>
                            <button onclick="toggleTaskStatus('${task.id}', '${task.status}')" class="${isCompleted ? 'text-gray-500 hover:text-gray-700 bg-gray-100' : 'text-green-600 hover:text-green-800 bg-green-50'} px-3 py-1 rounded font-bold transition"> 
                                <i class="fas ${isCompleted ? 'fa-undo' : 'fa-check'}"></i> ${isCompleted ? 'تراجع' : 'إنجاز المهمة'} 
                            </button> 
                        </div> 
                    </div> 
                `;
            });
        }

        async function toggleTaskStatus(id, currentStatus) {
            try {
                const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
                const { error } = await window.supabaseClient.from('tasks').update({ status: newStatus }).eq('id', id);
                if (error) throw error;
                await fetchTasks();
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteTask(id) {
            try {
                const ok = confirm('هل أنت متأكد من حذف هذه المهمة؟');
                if (!ok) return;
                const { error } = await window.supabaseClient.from('tasks').delete().eq('id', id);
                if (error) throw error;
                await fetchTasks();
            } catch (err) {
                console.error(err);
            }
        }

        function openTaskModal() {
            const el = document.getElementById('taskModal');
            document.getElementById('tTitle').value = '';
            document.getElementById('tDesc').value = '';
            document.getElementById('tAssign').value = '';
            document.getElementById('tDate').value = '';
            el.classList.remove('opacity-0', 'pointer-events-none');
            el.querySelector('.modal-container').classList.add('scale-100');
            el.querySelector('.modal-container').classList.remove('scale-95');
        }

        function closeModal(id) {
            const el = document.getElementById(id);
            el.querySelector('.modal-container').classList.remove('scale-100');
            el.querySelector('.modal-container').classList.add('scale-95');
            setTimeout(() => el.classList.add('opacity-0', 'pointer-events-none'), 150);
        }

        function openModal(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('opacity-0', 'pointer-events-none');
            el.querySelector('.modal-container').classList.add('scale-100');
            el.querySelector('.modal-container').classList.remove('scale-95');
        }
        window.openModal = openModal;

        window.editTask = function(id) { 
            const task = tasksList.find(t => String(t.id) === String(id)); 
            if (!task) return; 
            
            document.getElementById('currentTaskId').value = task.id; 
            document.getElementById('tTitle').value = task.title || ''; 
            document.getElementById('tDesc').value = task.description || ''; 
            document.getElementById('tDate').value = task.due_date ? task.due_date.split('T')[0] : ''; 
            document.getElementById('tAssign').value = task.assigned_to || ''; 
            
            document.getElementById('taskModal').querySelector('h3').innerText = 'تعديل التكليف'; 
            window.fetchSubtasks(task.id);
            openModal('taskModal'); 
        }; 
        
        window.openTaskDetails = function(id) { 
            console.log("Card clicked to view details for task:", id); 
            alert("سيتم برمجة نافذة عرض التفاصيل والشات في المرحلة القادمة للمهمة رقم: " + id); 
        }; 
        
        window.openNewTaskModal = function() { 
            document.getElementById('taskForm').reset(); 
            document.getElementById('currentTaskId').value = ''; 
            document.getElementById('taskModal').querySelector('h3').innerText = 'إضافة تكليف جديد'; 
            window.currentSubtasks = []; 
            document.getElementById('subtasksList').innerHTML = '<p class="text-xs text-gray-500 text-center py-3">يرجى حفظ التكليف الرئيسي أولاً لتتمكن من إضافة مهام فرعية.</p>'; 
            openModal('taskModal'); 
        }; 

        document.getElementById('taskForm').addEventListener('submit', async function (e) { 
            e.preventDefault(); 
            const btn = document.getElementById('saveBtn'); 
            const originalText = btn.innerHTML; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...'; 
            btn.disabled = true; 
            
            try { 
                const currentId = document.getElementById('currentTaskId').value; 
                const payload = { 
                    title: document.getElementById('tTitle').value.trim(), 
                    description: document.getElementById('tDesc').value.trim(), 
                    assigned_to: document.getElementById('tAssign').value || null, 
                    due_date: document.getElementById('tDate').value || null 
                }; 
        
                if (currentId) { 
                    // Update 
                    const { error } = await window.supabaseClient.from('tasks').update(payload).eq('id', currentId); 
                    if (error) throw error; 
                    closeModal('taskModal'); 
                } else { 
                    // Insert & Select Single ID safely 
                    payload.status = 'pending'; 
                    const { data, error } = await window.supabaseClient.from('tasks').insert([payload]).select('id').single(); 
                    if (error) throw error; 
                    
                    document.getElementById('currentTaskId').value = data.id; 
                    alert("تم حفظ التكليف بنجاح! يمكنك الآن إضافة مهام فرعية في الأسفل."); 
                    // Keep modal open to add subtasks, load empty subtasks list 
                    await window.fetchSubtasks(data.id); 
                } 
        
                await fetchTasks(); 
            } catch (err) { 
                console.error(err); 
                alert('حدث خطأ أثناء الحفظ: ' + err.message); 
            } finally { 
                btn.innerHTML = originalText; 
                btn.disabled = false; 
            } 
        }); 

        window.currentSubtasks = []; 
 
        window.fetchSubtasks = async function(taskId) { 
            if(!taskId) return; 
            document.getElementById('subtasksList').innerHTML = '<div class="text-center py-4 text-purple-600"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>'; 
            try { 
                const { data, error } = await window.supabaseClient.from('task_subtasks').select('*').eq('task_id', taskId).order('created_at', { ascending: true }); 
                if (error) throw error; 
                window.currentSubtasks = data || []; 
                window.renderSubtasks(); 
            } catch (err) { console.error("Error fetching subtasks:", err); } 
        }; 
 
        window.renderSubtasks = function() { 
            const list = document.getElementById('subtasksList'); 
            if(!list) return; 
            list.innerHTML = ''; 
            if(window.currentSubtasks.length === 0) { 
                list.innerHTML = '<p class="text-xs text-gray-500 text-center py-4">لا توجد مهام فرعية مضافة بعد.</p>'; 
                return; 
            } 
            window.currentSubtasks.forEach(st => { 
                const isChecked = st.is_completed ? 'checked' : ''; 
                const textStyle = st.is_completed ? 'line-through text-gray-400' : 'text-gray-800 font-bold'; 
                list.innerHTML += ` 
                    <div class="flex items-center justify-between p-2 border-b border-gray-200 bg-white mb-1 rounded"> 
                        <div class="flex items-center gap-3"> 
                            <input type="checkbox" ${isChecked} onchange="window.toggleSubtaskStatus('${st.id}', this.checked)" class="w-4 h-4 text-purple-600 rounded cursor-pointer"> 
                            <span class="text-sm ${textStyle}">${st.title}</span> 
                        </div> 
                        <div class="flex gap-2"> 
                            <button type="button" onclick="window.openSubtaskChat('${st.id}', '${st.task_id}', true)" class="text-indigo-600 hover:text-indigo-800 p-1 rounded" title="محادثة"><i class="fas fa-comments"></i></button> 
                            <button type="button" onclick="window.deleteSubtask('${st.id}')" class="text-red-500 hover:text-red-700 p-1 rounded" title="حذف"><i class="fas fa-trash"></i></button> 
                        </div> 
                    </div> 
                `; 
            }); 
        }; 
 
        window.addSubtask = async function(e) { 
            if(e) e.preventDefault(); 
            const taskId = document.getElementById('currentTaskId').value; 
            const input = document.getElementById('newSubtaskTitle'); 
            const title = input.value.trim(); 
            
            if(!taskId) return alert("يرجى حفظ التكليف الرئيسي أولاً (حتى لو كان فارغاً) لتتمكن من ربط المهام الفرعية به."); 
            if(!title) return; 
            
            const btn = e ? e.currentTarget : document.querySelector('button[onclick="window.addSubtask(event)"]'); 
            const oldHtml = btn.innerHTML; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; 
            btn.disabled = true; 
 
            try { 
                const { error } = await window.supabaseClient.from('task_subtasks').insert([{ task_id: taskId, title: title, is_completed: false }]); 
                if(error) throw error; 
                input.value = ''; 
                await window.fetchSubtasks(taskId); 
            } catch(err) { alert("خطأ: " + err.message); } 
            finally { btn.innerHTML = oldHtml; btn.disabled = false; } 
        }; 
 
        window.toggleSubtaskStatus = async function(subtaskId, isCompleted) { 
            try { 
                await window.supabaseClient.from('task_subtasks').update({ is_completed: isCompleted }).eq('id', subtaskId); 
                await window.fetchSubtasks(document.getElementById('currentTaskId').value); 
            } catch (err) { console.error(err); } 
        }; 
 
        window.deleteSubtask = async function(subtaskId) { 
            if(!confirm('هل أنت متأكد من حذف هذه المهمة الفرعية؟')) return; 
            try { 
                await window.supabaseClient.from('task_subtasks').delete().eq('id', subtaskId); 
                await window.fetchSubtasks(document.getElementById('currentTaskId').value); 
            } catch (err) { console.error(err); } 
        }; 

        window.openTaskDetails = async function(taskId) { 
            const task = tasksList.find(t => String(t.id) === String(taskId)); 
            if(!task) return; 
            
            document.getElementById('detailsTaskId').value = task.id; 
            document.getElementById('detTitle').innerText = task.title || 'بدون عنوان'; 
            document.getElementById('detDesc').innerText = task.description || 'لا يوجد وصف مضاف لهذا التكليف.'; 
            document.getElementById('detDate').innerText = task.due_date ? task.due_date.split('T')[0] : 'غير محدد'; 
            document.getElementById('detAssign').innerText = window.getEmployeeName(task.assigned_to); 
            
            document.getElementById('detailsSubtasksList').innerHTML = '<div class="text-center py-6"><i class="fas fa-spinner fa-spin text-blue-500 text-2xl mb-2 block"></i><span class="text-sm text-gray-500">جاري تحميل المهام...</span></div>'; 
            
            openModal('taskDetailsModal'); 
            
            try { 
                const { data, error } = await window.supabaseClient.from('task_subtasks').select('*').eq('task_id', taskId).order('created_at', { ascending: true }); 
                if (error) throw error; 
                window.renderDetailsSubtasks(data || []); 
            } catch (err) { 
                console.error(err); 
                document.getElementById('detailsSubtasksList').innerHTML = '<p class="text-red-500 text-center text-sm py-4">فشل تحميل المهام الفرعية.</p>'; 
            } 
        }; 
        
        window.renderDetailsSubtasks = function(subtasks) { 
            const list = document.getElementById('detailsSubtasksList'); 
            list.innerHTML = ''; 
            if(!subtasks || subtasks.length === 0) { 
                list.innerHTML = '<p class="text-sm text-gray-500 text-center py-6 bg-gray-50 rounded">لا توجد مهام فرعية مطلوبة في هذا التكليف.</p>'; 
                return; 
            } 
            subtasks.forEach(st => { 
                const isChecked = st.is_completed ? 'checked' : ''; 
                const textStyle = st.is_completed ? 'line-through text-gray-400' : 'text-gray-800 font-bold'; 
                const bgClass = st.is_completed ? 'bg-gray-50' : 'bg-white'; 
                list.innerHTML += ` 
                    <div class="flex items-center justify-between p-3 border-b border-gray-100 hover:bg-blue-50 transition rounded-lg mb-1 ${bgClass}"> 
                        <div class="flex items-center gap-3"> 
                            <input type="checkbox" ${isChecked} onchange="window.toggleDetailsSubtask('${st.id}', this.checked, '${st.task_id}')" class="w-5 h-5 text-blue-600 rounded cursor-pointer"> 
                            <span class="text-sm ${textStyle}">${st.title}</span> 
                        </div> 
                        <button type="button" onclick="window.openSubtaskChat('${st.id}', '${st.task_id}', false)" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 p-2 rounded-lg transition" title="فتح المحادثة"> 
                            <i class="fas fa-comments"></i> 
                        </button> 
                    </div> 
                `; 
            }); 
        }; 
        
        window.toggleDetailsSubtask = async function(subtaskId, isCompleted, taskId) { 
            try { 
                await window.supabaseClient.from('task_subtasks').update({ is_completed: isCompleted }).eq('id', subtaskId); 
                // Refresh silently 
                const { data } = await window.supabaseClient.from('task_subtasks').select('*').eq('task_id', taskId).order('created_at', { ascending: true }); 
                window.renderDetailsSubtasks(data || []); 
            } catch (err) { console.error(err); } 
        };

        window.openSubtaskChat = async function(subtaskId, taskId, isAdminView = false) { 
            document.getElementById('activeSubtaskIdForChat').value = subtaskId; 
            document.getElementById('activeChatTaskId').value = taskId; 
            document.getElementById('newSubtaskCommentInput').value = ''; 
            
            let subtasksSource = isAdminView ? window.currentSubtasks : []; 
            if (!isAdminView) { 
                document.getElementById('subtaskChatMessagesContainer').innerHTML = '<div class="text-center mt-10"><i class="fas fa-spinner fa-spin text-indigo-500 text-2xl"></i></div>'; 
                openModal('subtaskChatModal'); 
                const { data } = await window.supabaseClient.from('task_subtasks').select('*').eq('id', subtaskId).single(); 
                if (data) subtasksSource = [data]; 
            } else { 
                openModal('subtaskChatModal'); 
            } 
        
            const st = subtasksSource.find(s => String(s.id) === String(subtaskId)); 
            let comments = []; 
            if(st && st.comments) { 
                try { comments = typeof st.comments === 'string' ? JSON.parse(st.comments) : st.comments; } 
                catch(e) { comments = []; } 
            } 
            window.renderSubtaskChat(comments); 
        }; 
        
        window.renderSubtaskChat = function(comments) { 
            const container = document.getElementById('subtaskChatMessagesContainer'); 
            container.innerHTML = ''; 
            if(!comments || comments.length === 0) { 
                container.innerHTML = '<div class="text-center text-sm text-gray-400 mt-10"><i class="fas fa-comments text-3xl mb-2 opacity-30 block"></i>لا يوجد نقاش حتى الآن، ابدأ المحادثة!</div>'; 
                return; 
            } 
            
            const currentUserData = localStorage.getItem('gpack_user') ? JSON.parse(localStorage.getItem('gpack_user')) : { name: 'مستخدم', id: 'unknown' }; 
            
            comments.forEach(c => { 
                const isMe = String(c.userId) === String(currentUserData.id) || String(c.user) === String(currentUserData.name); 
                const alignClass = isMe ? 'self-end bg-indigo-100 border-indigo-200' : 'self-start bg-white border-gray-200'; 
                const nameClass = isMe ? 'text-indigo-800' : 'text-gray-800'; 
                container.innerHTML += ` 
                    <div class="max-w-[85%] p-3 rounded-lg border shadow-sm ${alignClass}"> 
                        <div class="flex justify-between items-end gap-4 mb-1 border-b pb-1 border-opacity-50"> 
                            <span class="font-bold text-[11px] ${nameClass}"><i class="fas fa-user text-opacity-50 mr-1"></i> ${c.user}</span> 
                            <span class="text-[10px] text-gray-500 font-mono">${new Date(c.time).toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit'})}</span> 
                        </div> 
                        <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${c.text}</p> 
                    </div> 
                `; 
            }); 
            setTimeout(() => container.scrollTop = container.scrollHeight, 100); 
        }; 
        
        window.submitSubtaskComment = async function(e) { 
            e.preventDefault(); 
            const input = document.getElementById('newSubtaskCommentInput'); 
            const text = input.value.trim(); 
            const subtaskId = document.getElementById('activeSubtaskIdForChat').value; 
            if(!text || !subtaskId) return; 
            
            const btn = document.getElementById('btnSubmitSubtaskComment'); 
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; 
            
            const currentUserData = localStorage.getItem('gpack_user') ? JSON.parse(localStorage.getItem('gpack_user')) : { name: 'مستخدم', id: 'unknown' }; 
            const newComment = { user: currentUserData.name, userId: currentUserData.id, time: new Date().toISOString(), text: text }; 
            
            try { 
                const { data: currentST } = await window.supabaseClient.from('task_subtasks').select('comments').eq('id', subtaskId).single(); 
                let comments = []; 
                if(currentST && currentST.comments) { 
                    comments = typeof currentST.comments === 'string' ? JSON.parse(currentST.comments) : currentST.comments; 
                } 
                comments.push(newComment); 
                
                const { error } = await window.supabaseClient.from('task_subtasks').update({ comments: comments }).eq('id', subtaskId); 
                if(error) throw error; 
                
                input.value = ''; 
                window.renderSubtaskChat(comments); 
                
                const localSt = window.currentSubtasks.find(s => String(s.id) === String(subtaskId)); 
                if(localSt) localSt.comments = comments; 
                
            } catch (err) { alert("فشل الإرسال: " + err.message); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i>'; } 
        };
    </script>
    <div id="taskDetailsModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[60]"> 
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-60" onclick="closeModal('taskDetailsModal')"></div> 
        <div class="modal-container bg-white w-full max-w-2xl mx-4 rounded-xl shadow-2xl z-50 p-0 transform transition-all scale-95 flex flex-col max-h-[90vh]"> 
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center rounded-t-xl shrink-0"> 
                <h3 class="font-bold text-lg"><i class="fas fa-tasks mr-2"></i> تفاصيل التكليف</h3> 
                <button type="button" onclick="closeModal('taskDetailsModal')" class="text-white hover:text-red-300"><i class="fas fa-times text-xl"></i></button> 
            </div> 
            <div class="p-6 overflow-y-auto flex-1 bg-gray-50"> 
                <input type="hidden" id="detailsTaskId"> 
                <h2 id="detTitle" class="text-2xl font-bold text-blue-900 mb-3"></h2> 
                <div class="bg-white p-4 rounded-lg border shadow-sm mb-4"> 
                    <p class="text-xs text-gray-500 mb-1 font-bold">الوصف والتفاصيل:</p> 
                    <p id="detDesc" class="text-sm text-gray-800 whitespace-pre-wrap"></p> 
                </div> 
                <div class="grid grid-cols-2 gap-4 mb-6"> 
                    <div class="bg-white p-3 rounded-lg border shadow-sm"><span class="text-xs text-gray-500 block">تاريخ الاستحقاق</span><span id="detDate" class="font-bold text-sm text-gray-800"></span></div> 
                    <div class="bg-white p-3 rounded-lg border shadow-sm"><span class="text-xs text-gray-500 block">المندوب / المسؤول</span><span id="detAssign" class="font-bold text-sm text-gray-800"></span></div> 
                </div> 
                <div class="border-t border-gray-200 pt-5"> 
                    <h4 class="font-bold text-gray-800 mb-3 border-r-4 border-blue-500 pr-2">المهام الفرعية (الإنجاز)</h4> 
                    <div id="detailsSubtasksList" class="bg-white border rounded-lg p-2 max-h-56 overflow-y-auto shadow-inner"> 
                    </div> 
                </div> 
            </div> 
            <div class="p-4 bg-white border-t rounded-b-xl flex justify-end shrink-0"> 
                <button type="button" onclick="closeModal('taskDetailsModal')" class="bg-gray-200 px-6 py-2 rounded-lg font-bold hover:bg-gray-300 text-gray-800 shadow-sm">إغلاق النافذة</button> 
            </div> 
        </div> 
    </div> 
    <div id="subtaskChatModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[80]"> 
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-60" onclick="closeModal('subtaskChatModal')"></div> 
        <div class="modal-container bg-white w-full max-w-lg mx-4 rounded-xl shadow-2xl z-50 p-0 transform transition-all scale-95 flex flex-col h-[70vh]"> 
            <div class="bg-indigo-600 text-white p-4 flex justify-between items-center rounded-t-xl shrink-0"> 
                <h3 class="font-bold text-sm"><i class="fas fa-comments mr-2"></i> نقاش المهمة الفرعية</h3> 
                <button type="button" onclick="closeModal('subtaskChatModal')" class="text-white hover:text-red-300"><i class="fas fa-times text-xl"></i></button> 
            </div> 
            <div class="flex-1 bg-slate-50 p-4 overflow-y-auto flex flex-col gap-3" id="subtaskChatMessagesContainer"></div> 
            <div class="p-3 bg-white border-t rounded-b-xl shrink-0"> 
                <form onsubmit="window.submitSubtaskComment(event)" class="flex gap-2"> 
                    <input type="hidden" id="activeSubtaskIdForChat"> 
                    <input type="hidden" id="activeChatTaskId"> 
                    <input type="text" id="newSubtaskCommentInput" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-indigo-500 outline-none" placeholder="اكتب رسالتك هنا..." required> 
                    <button type="submit" id="btnSubmitSubtaskComment" class="bg-indigo-600 text-white px-5 rounded-lg font-bold hover:bg-indigo-700 transition"><i class="fas fa-paper-plane"></i></button> 
                </form> 
            </div> 
        </div> 
    </div> 
</body>

</html>
