<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جي باك 2.0 | G.PACK ERP</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'Tajawal', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#f5f0fa',
                            100: '#ebe0f3',
                            200: '#d6c2e7',
                            300: '#b89ad6',
                            400: '#9a72c4',
                            500: '#7e52b0',
                            600: '#6a3e9c',
                            700: '#5A246D',
                            800: '#4a1d59',
                            900: '#3D226B',
                        },
                        gold: {
                            50:  '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#FBC010',
                            500: '#e8a800',
                            600: '#c98c00',
                            700: '#a66e00',
                            800: '#875500',
                            900: '#6b4400',
                        },
                        sidebar: '#3D226B',
                    },
                },
            },
        };
    </script>

    <!-- Google Fonts: Cairo (Arabic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * { font-family: 'Cairo', sans-serif; }

        /* Sidebar transition */
        #sidebar {
            transition: transform 0.3s ease, width 0.3s ease;
        }

        /* Sidebar collapsed state on desktop */
        #sidebar.collapsed {
            width: 4.5rem;
        }
        #sidebar.collapsed .nav-label,
        #sidebar.collapsed .sidebar-logo-text,
        #sidebar.collapsed .sidebar-section-title {
            display: none;
        }
        #sidebar.collapsed .nav-item {
            justify-content: center;
        }

        /* Mobile: sidebar slides in from right (RTL) */
        @media (max-width: 1023px) {
            #sidebar {
                position: fixed;
                top: 0;
                right: 0;
                height: 100%;
                z-index: 40;
                transform: translateX(100%);
                width: 16rem !important;
            }
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            #sidebar.collapsed {
                width: 16rem !important;
            }
            #sidebar.collapsed .nav-label,
            #sidebar.collapsed .sidebar-logo-text,
            #sidebar.collapsed .sidebar-section-title {
                display: inline;
            }
            #sidebar.collapsed .nav-item {
                justify-content: flex-start;
            }
        }

        /* Page content fade transition */
        #main-content {
            transition: opacity 0.15s ease;
        }
        #main-content.loading {
            opacity: 0.4;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Toast notification */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">

    <!-- =====================================================================
         TOAST NOTIFICATION CONTAINER
    ====================================================================== -->
    <div id="toast-container"></div>

    <!-- =====================================================================
         LOGIN VIEW
         Hidden after successful authentication.
    ====================================================================== -->
    <div id="login-view" class="hidden">
        <!-- login.html is injected here by auth.js on page load -->
    </div>

    <!-- =====================================================================
         APP LAYOUT
         Shown after successful authentication.
         Structure: Sidebar (right, RTL) + Main area (header + content)
    ====================================================================== -->
    <div id="app-layout" class="hidden flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside id="sidebar" class="bg-sidebar text-white flex flex-col w-64 flex-shrink-0 overflow-y-auto overflow-x-hidden">
            <!-- Logo -->
            <div class="flex items-center gap-3 px-5 py-4 border-b border-brand-800">
                <img src="/images/logo.png" alt="G.PACK" class="w-12 h-12 rounded-lg object-contain flex-shrink-0" />
                <div class="sidebar-logo-text">
                    <p class="font-bold text-white text-base leading-tight">G.PACK</p>
                    <p class="text-gold-400 text-xs">نظام إدارة المستودعات</p>
                </div>
            </div>

            <!-- Navigation is injected by layout.js -->
            <nav id="sidebar-nav" class="flex-1 py-4 px-3 space-y-1"></nav>

            <!-- User info bottom -->
            <div id="sidebar-user" class="px-4 py-4 border-t border-slate-700"></div>
        </aside>

        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

            <!-- Top Header -->
            <header id="main-header" class="bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 h-16 flex-shrink-0 z-20">
                <!-- Left side: mobile menu toggle + breadcrumb -->
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" class="lg:hidden text-slate-500 hover:text-slate-800 transition-colors p-2 rounded-lg hover:bg-slate-100">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <button id="sidebar-collapse-toggle" class="hidden lg:flex text-slate-400 hover:text-slate-700 transition-colors p-2 rounded-lg hover:bg-slate-100">
                        <i class="fa-solid fa-sidebar text-base"></i>
                    </button>
                    <div id="breadcrumb" class="text-sm text-slate-500 hidden sm:block"></div>
                </div>

                <!-- Right side: header actions -->
                <div class="flex items-center gap-2">
                    <button class="relative p-2 rounded-lg text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors">
                        <i class="fa-regular fa-bell text-lg"></i>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div id="header-user" class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-100 cursor-pointer transition-colors">
                        <div id="header-avatar" class="w-8 h-8 rounded-full bg-brand-700 flex items-center justify-center text-white text-sm font-bold flex-shrink-0"></div>
                        <span id="header-username" class="text-sm font-medium text-slate-700 hidden sm:block"></span>
                        <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                    </div>
                </div>
            </header>

            <!-- Main Content Area — views are injected here -->
            <main id="main-content" class="flex-1 overflow-y-auto p-4 lg:p-6">
                <div class="flex items-center justify-center h-full">
                    <div class="text-center text-slate-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-brand-500"></i>
                        <p class="text-sm">جارٍ التحميل...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- =====================================================================
         JAVASCRIPT MODULES (order matters)
    ====================================================================== -->
    <script src="/js/api.js?v=20260501"></script>
    <script src="/js/auth.js?v=20260501"></script>
    <script src="/js/layout.js?v=20260601"></script>
    <script src="/js/app.js?v=20260501"></script>

</body>
</html>
