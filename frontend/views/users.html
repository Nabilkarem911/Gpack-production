<!-- G.PACK 2.0 - Users & Roles Management -->

<!-- Header -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-800">المستخدمين والأدوار</h1>
        <p class="text-slate-500 text-sm mt-0.5">إدارة المستخدمين والأدوار</p>
    </div>
    <div class="flex gap-2">
        <button id="btn-add-role"
                class="flex items-center gap-2 px-4 py-2.5 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-xl shadow transition-all">
            <i class="fa-solid fa-shield-halved"></i>
            <span>دور جديد</span>
        </button>
        <button id="btn-add-user"
                class="flex items-center gap-2 px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-bold rounded-xl shadow transition-all">
            <i class="fa-solid fa-user-plus"></i>
            <span>مستخدم جديد</span>
        </button>
    </div>
</div>

<!-- Stats -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600">
            <i class="fa-solid fa-users"></i>
        </div>
        <div>
            <p class="text-2xl font-extrabold text-slate-800" id="stat-total">0</p>
            <p class="text-xs text-slate-500">إجمالي المستخدمين</p>
        </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <div>
            <p class="text-2xl font-extrabold text-slate-800" id="stat-active">0</p>
            <p class="text-xs text-slate-500">مستخدمون نشطون</p>
        </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div>
            <p class="text-2xl font-extrabold text-slate-800" id="stat-roles">0</p>
            <p class="text-xs text-slate-500">إجمالي الأدوار</p>
        </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center text-amber-600">
            <i class="fa-solid fa-user-tag"></i>
        </div>
        <div>
            <p class="text-2xl font-extrabold text-slate-800" id="stat-with-roles">0</p>
            <p class="text-xs text-slate-500">مستخدمون بأدوار</p>
        </div>
    </div>
</div>

<!-- Tabs -->
<div class="bg-white rounded-xl border border-slate-100 shadow-sm">
    <div class="flex border-b border-slate-200">
        <button id="tab-users-btn" onclick="usersView.switchTab('users')"
                class="px-6 py-3 text-sm font-semibold text-brand-600 border-b-2 border-brand-600 bg-brand-50 transition-all">
            <i class="fa-solid fa-users ml-1"></i> المستخدمون
        </button>
        <button id="tab-roles-btn" onclick="usersView.switchTab('roles')"
                class="px-6 py-3 text-sm font-semibold text-slate-500 hover:text-slate-700 hover:bg-slate-50 transition-all">
            <i class="fa-solid fa-shield-halved ml-1"></i> الأدوار
        </button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="p-5">
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input id="search-users" type="text" placeholder="بحث بالاسم أو البريد..."
                       oninput="usersView.renderUsers()"
                       class="w-full pr-9 pl-4 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20" />
            </div>
            <select id="filter-role" onchange="usersView.renderUsers()"
                    class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-500">
                <option value="">جميع الأدوار</option>
            </select>
            <select id="filter-status" onchange="usersView.renderUsers()"
                    class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-500">
                <option value="">جميع الحالات</option>
                <option value="active">نشط</option>
                <option value="inactive">معطل</option>
            </select>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">المستخدم</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">البريد</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">الدور</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">الحالة</th>
                        <th class="text-center py-3 px-4 text-xs font-bold text-slate-500 uppercase">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="5" class="py-12 text-center text-slate-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl"></i>
                    </td></tr>
                </tbody>
            </table>
        </div>
        <div id="users-empty" class="hidden py-16 text-center text-slate-400">
            <i class="fa-solid fa-users text-5xl mb-3 text-slate-200"></i>
            <p class="font-semibold text-slate-500">لا يوجد مستخدمون</p>
        </div>
    </div>

    <!-- Roles Tab -->
    <div id="tab-roles" class="p-5 hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">الدور</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">الوصف</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase">المستخدمون</th>
                        <th class="text-center py-3 px-4 text-xs font-bold text-slate-500 uppercase">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="roles-tbody">
                    <tr><td colspan="4" class="py-12 text-center text-slate-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl"></i>
                    </td></tr>
                </tbody>
            </table>
        </div>
        <div id="roles-empty" class="hidden py-16 text-center text-slate-400">
            <i class="fa-solid fa-shield-halved text-5xl mb-3 text-slate-200"></i>
            <p class="font-semibold text-slate-500">لا توجد أدوار</p>
        </div>
    </div>
</div>

<!-- USER MODAL -->
<div id="user-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div class="flex items-center justify-between p-5 border-b border-slate-100">
            <h3 id="user-modal-title" class="text-lg font-bold text-slate-800">مستخدم جديد</h3>
            <button onclick="usersView.closeUserModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-5 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">الاسم الكامل <span class="text-red-500">*</span></label>
                <input id="um-name" type="text" placeholder="محمد أحمد"
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">البريد الإلكتروني <span class="text-red-500">*</span></label>
                <input id="um-email" type="email" placeholder="user@example.com"
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none" />
            </div>
            <div id="um-password-wrap">
                <label id="um-password-label" class="block text-sm font-medium text-slate-700 mb-1">كلمة المرور <span class="text-red-500">*</span></label>
                <input id="um-password" type="password" placeholder="6 أحرف على الأقل"
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">الدور</label>
                <select id="um-role" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-brand-500 outline-none">
                    <option value="">بدون دور</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">الحالة</label>
                <select id="um-status" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-brand-500 outline-none">
                    <option value="active">نشط</option>
                    <option value="inactive">معطل</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end gap-3 p-5 border-t border-slate-100">
            <button onclick="usersView.closeUserModal()" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">إلغاء</button>
            <button onclick="usersView.saveUser()" class="px-5 py-2 rounded-xl text-sm font-bold bg-brand-600 hover:bg-brand-700 text-white transition-all">حفظ</button>
        </div>
    </div>
</div>

<!-- ROLE MODAL -->
<div id="role-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-slate-100 flex-shrink-0">
            <h3 id="role-modal-title" class="text-lg font-bold text-slate-800">دور جديد</h3>
            <button onclick="usersView.closeRoleModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-5 space-y-4 overflow-y-auto flex-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">اسم الدور <span class="text-red-500">*</span></label>
                    <input id="rm-name" type="text" placeholder="مثال: مدير المبيعات"
                           class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">الوصف</label>
                    <input id="rm-desc" type="text" placeholder="وصف مختصر لصلاحيات هذا الدور"
                           class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 outline-none" />
                </div>
            </div>

            <!-- Permissions Grid -->
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-bold text-slate-700">الصلاحيات</label>
                    <button type="button" onclick="usersView._toggleAllPermissions(true)" class="text-xs text-purple-600 hover:text-purple-800 font-medium">تحديد الكل</button>
                </div>
                <div class="border border-slate-200 rounded-xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="text-right py-2 px-3 font-semibold text-slate-600 text-xs">الصفحة / الوحدة</th>
                                <th class="text-center py-2 px-2 font-semibold text-slate-600 text-xs w-16">مشاهدة</th>
                                <th class="text-center py-2 px-2 font-semibold text-slate-600 text-xs w-16">إضافة</th>
                                <th class="text-center py-2 px-2 font-semibold text-slate-600 text-xs w-16">تعديل</th>
                                <th class="text-center py-2 px-2 font-semibold text-slate-600 text-xs w-16">حذف</th>
                            </tr>
                        </thead>
                        <tbody id="rm-perms-tbody" class="divide-y divide-slate-100">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="flex justify-end gap-3 p-5 border-t border-slate-100 flex-shrink-0">
            <button onclick="usersView.closeRoleModal()" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">إلغاء</button>
            <button onclick="usersView.saveRole()" class="px-5 py-2 rounded-xl text-sm font-bold bg-purple-600 hover:bg-purple-700 text-white transition-all">حفظ</button>
        </div>
    </div>
</div>

<script src="/js/views/users.js"></script>
