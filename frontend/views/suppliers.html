<!-- =============================================================================
     G.PACK 2.0 - Suppliers View Fragment
     Injected into #main-content by the SPA router.
     Logic is handled by /js/views/suppliers.js (loaded below).
============================================================================= -->

<!-- Page Header -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-800">إدارة الموردين والمطابع</h1>
        <p class="text-slate-500 text-sm mt-0.5">قائمة الموردين والمصانع والمطابع</p>
    </div>
    <button id="add-supplier-btn"
            class="flex items-center gap-2 px-5 py-2.5 bg-brand-600 hover:bg-brand-700 active:scale-[0.98]
                   text-white text-sm font-bold rounded-xl shadow-md shadow-brand-600/20 transition-all">
        <i class="fa-solid fa-plus"></i>
        <span>إضافة مورد</span>
    </button>
</div>

<!-- Search & Filter Bar -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
    <div class="flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1 max-w-sm">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text"
                   id="suppliers-search"
                   placeholder="بحث باسم الشركة، الشخص المسؤول..."
                   class="w-full pr-10 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                          text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                          focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm text-slate-500">الحالة:</span>
            <select id="suppliers-status-filter"
                    class="px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                           text-slate-800 outline-none focus:border-brand-500
                           focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all cursor-pointer">
                <option value="">الكل</option>
                <option value="active">نشط</option>
                <option value="inactive">غير نشط</option>
            </select>
        </div>
    </div>
</div>

<!-- Suppliers Table Card -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="text-right py-3.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">الشركة</th>
                    <th class="text-right py-3.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">الشخص المسؤول</th>
                    <th class="text-right py-3.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">الهاتف</th>
                    <th class="text-right py-3.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">البريد الإلكتروني</th>
                    <th class="text-right py-3.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">الحالة</th>
                    <th class="py-3.5 px-4"></th>
                </tr>
            </thead>
            <tbody id="suppliers-tbody">
                <tr>
                    <td colspan="6" class="py-10 text-center text-slate-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl"></i>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty state -->
    <div id="suppliers-empty" class="hidden py-16 text-center text-slate-400">
        <i class="fa-solid fa-truck text-5xl mb-4 text-slate-200"></i>
        <p class="text-base font-semibold text-slate-500">لا يوجد موردين حتى الآن</p>
        <p class="text-sm mt-1">ابدأ بإضافة أول مورد لك</p>
    </div>
</div>

<!-- =============================================================================
     ADD / EDIT SUPPLIER MODAL
     Visibility controlled via CSS opacity + scale. Hidden class toggled by JS.
     Backdrop click closes the modal (wired in suppliers.js).
============================================================================= -->
<div id="supplier-modal"
     style="display:none"
     class="fixed inset-0 z-50 items-center justify-center p-4
            bg-black/50 opacity-0 transition-opacity duration-200">

    <div class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto
                transform scale-95 transition-transform duration-200">

        <!-- Modal Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
            <h2 id="modal-title" class="text-lg font-bold text-slate-800">إضافة مورد جديد</h2>
            <button id="modal-close-btn"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400
                           hover:text-slate-700 hover:bg-slate-100 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Modal Body -->
        <div id="supplier-form" class="px-6 py-5 space-y-4">

            <!-- Error Alert -->
            <div id="supplier-form-error"
                 class="hidden flex items-center gap-2 bg-red-50 border border-red-200 text-red-700
                        rounded-xl px-4 py-3 text-sm font-medium">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                <span></span>
            </div>

            <!-- Company Name -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                    اسم الشركة <span class="text-red-500">*</span>
                </label>
                <input type="text" id="supplier-company-name"
                       placeholder="مثال: مطبعة النصر"
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                              text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
            </div>

            <!-- Contact Person -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">الشخص المسؤول</label>
                <input type="text" id="supplier-contact-person"
                       placeholder="اسم المسؤول عن التواصل"
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                              text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">رقم الهاتف</label>
                <input type="tel" id="supplier-phone"
                       placeholder="0501234567"
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                              text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">البريد الإلكتروني</label>
                <input type="email" id="supplier-email"
                       placeholder="email@example.com"
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                              text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
            </div>

            <!-- Address -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">العنوان</label>
                <textarea id="supplier-address" rows="2"
                          placeholder="عنوان الشركة أو المقر"
                          class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                                 text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                                 focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all resize-none"></textarea>
            </div>

            <!-- Status -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">الحالة</label>
                <select id="supplier-status"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                               text-slate-800 outline-none focus:border-brand-500
                               focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all cursor-pointer">
                    <option value="active">نشط</option>
                    <option value="inactive">غير نشط</option>
                </select>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-100">
            <button id="modal-cancel-btn"
                    class="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:text-slate-800
                           hover:bg-slate-100 rounded-xl transition-colors">
                إلغاء
            </button>
            <button id="modal-save-btn"
                    class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 active:scale-[0.98]
                           text-white text-sm font-bold rounded-xl shadow-md shadow-brand-600/20 transition-all">
                حفظ
            </button>
        </div>
    </div>
</div>

<script src="/js/views/suppliers.js?v=20260503x"></script>
