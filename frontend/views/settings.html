<!-- =============================================================================
     G.PACK 2.0 - Settings View Fragment
     Injected into #main-content by the SPA router.
     Logic is handled by /js/views/settings.js (loaded below).
     Master Data Management: Standard Terms.
============================================================================= -->

<!-- Page Header -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-800">إعدادات النظام</h1>
        <p class="text-slate-500 text-sm mt-0.5">إدارة البيانات الأساسية — بنود الاتفاقيات</p>
    </div>
</div>

<!-- Tab Navigation -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

    <!-- Tab Bar -->
    <div class="flex border-b border-slate-200 bg-slate-50">
        <button id="tab-terms-btn"
                onclick="window.switchSettingsTab('terms')"
                class="settings-tab-btn flex items-center gap-2 px-6 py-4 text-sm font-bold
                       border-b-2 border-violet-600 text-violet-600 transition-colors">
            <i class="fa-solid fa-file-contract"></i>
            <span>بنود الاتفاقيات</span>
        </button>
    </div>

    <!-- ── TAB: Terms ── -->
    <div id="tab-terms" class="p-6">
        <div class="flex items-center justify-between mb-5">
            <div>
                <h2 class="text-base font-bold text-slate-800">بنود الاتفاقيات</h2>
                <p class="text-slate-400 text-xs mt-0.5">شروط وأحكام قياسية تظهر في عروض الأسعار</p>
            </div>
            <button id="add-term-btn"
                    class="flex items-center gap-2 px-4 py-2.5 bg-violet-600 hover:bg-violet-700
                           text-white text-sm font-bold rounded-xl shadow-sm transition-all active:scale-[0.98]">
                <i class="fa-solid fa-plus"></i>
                <span>إضافة بند</span>
            </button>
        </div>

        <!-- Terms Table -->
        <div class="overflow-x-auto rounded-xl border border-slate-200">
            <table class="w-full">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">العنوان</th>
                        <th class="text-right py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide hidden sm:table-cell">المحتوى</th>
                        <th class="text-center py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wide">افتراضي</th>
                        <th class="py-3 px-4 w-24"></th>
                    </tr>
                </thead>
                <tbody id="terms-tbody">
                    <tr>
                        <td colspan="4" class="py-10 text-center text-slate-400">
                            <i class="fa-solid fa-circle-notch fa-spin text-xl"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="terms-empty" class="hidden py-12 text-center text-slate-400">
            <i class="fa-solid fa-file-contract text-4xl mb-3 text-slate-200"></i>
            <p class="text-sm font-semibold text-slate-500">لا توجد بنود حتى الآن</p>
            <p class="text-xs mt-1">ابدأ بإضافة أول بند اتفاقية</p>
        </div>
    </div>

</div>

<!-- =============================================================================
     TERM ADD / EDIT MODAL
============================================================================= -->
<div id="settings-term-modal"
     style="display:none"
     class="fixed inset-0 z-50 items-center justify-center p-4
            bg-black/50 opacity-0 transition-opacity duration-200">

    <div class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-md
                transform scale-95 transition-transform duration-200">

        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-violet-100 flex items-center justify-center">
                    <i class="fa-solid fa-file-contract text-violet-600 text-xs"></i>
                </div>
                <h2 id="term-modal-title" class="text-base font-bold text-slate-800">إضافة بند</h2>
            </div>
            <button id="settings-term-close-btn" type="button"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400
                           hover:text-slate-700 hover:bg-slate-100 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="px-6 py-5 space-y-4">
            <div id="settings-term-error"
                 class="hidden flex items-center gap-2 bg-red-50 border border-red-200
                        text-red-700 rounded-xl px-4 py-3 text-sm font-medium">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                <span></span>
            </div>

            <div>
                <label for="settings-term-title" class="block text-sm font-semibold text-slate-700 mb-1.5">
                    العنوان <span class="text-red-500">*</span>
                </label>
                <input type="text" id="settings-term-title" placeholder="مثال: شروط الدفع"
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm
                              text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all" />
            </div>

            <div>
                <label for="settings-term-content" class="block text-sm font-semibold text-slate-700 mb-1.5">
                    المحتوى <span class="text-red-500">*</span>
                </label>
                <textarea id="settings-term-content" rows="4" placeholder="نص البند كاملاً..."
                          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm
                                 text-slate-800 placeholder-slate-400 outline-none focus:border-brand-500
                                 focus:ring-2 focus:ring-brand-500/20 focus:bg-white transition-all resize-none"></textarea>
            </div>

            <div class="flex items-center gap-3">
                <input type="checkbox" id="settings-term-default"
                       class="w-4 h-4 rounded border-slate-300 text-violet-600
                              focus:ring-violet-500/30 transition-colors" />
                <label for="settings-term-default" class="text-sm font-semibold text-slate-700 cursor-pointer">
                    بند افتراضي (يتم تحديده تلقائياً في عروض الأسعار)
                </label>
            </div>

            <div class="flex items-center justify-end gap-3 pt-2 border-t border-slate-100">
                <button id="settings-term-cancel-btn" type="button"
                        class="px-5 py-2.5 text-sm font-semibold text-slate-600 bg-white border
                               border-slate-200 rounded-xl hover:bg-slate-100 transition-colors">
                    إلغاء
                </button>
                <button id="settings-term-submit-btn" type="button"
                        onclick="window.submitSettingsTermForm()"
                        class="px-6 py-2.5 text-sm font-bold text-white bg-violet-600 hover:bg-violet-700
                               rounded-xl shadow-md shadow-violet-600/20 transition-all active:scale-[0.98]">
                    إضافة
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Load the view controller -->
<script src="/js/views/settings.js?v=20260628"></script>
