<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف حساب | G.PACK</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background:#f8fafc; color:#1e293b; padding:30px; direction:rtl; }
        @media print { body { padding:15px; background:#fff; } .no-print { display:none !important; } @page { margin:15mm; } }
        .doc-container { max-width:800px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; padding-bottom:18px; border-bottom:3px solid #4b0082; }
        .logo-section { display:flex; align-items:center; gap:12px; }
        .logo-section img { width:58px; height:58px; object-fit:contain; }
        .logo-text h1 { font-size:24px; font-weight:900; color:#4b0082; margin-bottom:4px; }
        .logo-text p { font-size:12px; color:#64748b; }
        .doc-meta { text-align:left; }
        .doc-meta .doc-title { font-size:20px; font-weight:900; color:#1e293b; }
        .doc-meta .doc-date { font-size:12px; color:#64748b; margin-top:4px; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; background:#faf5ff; border-radius:12px; padding:20px; border:1px solid #e9d5ff; }
        .info-item label { font-size:11px; color:#64748b; display:block; margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .info-item span { font-weight:700; font-size:14px; color:#1e293b; }
        .summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
        .summary-card { background:#faf5ff; border:1px solid #e9d5ff; border-radius:12px; padding:16px; text-align:center; }
        .summary-card label { font-size:11px; color:#64748b; display:block; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .summary-card .val { font-size:22px; font-weight:900; }
        .summary-card.debit .val { color:#dc2626; }
        .summary-card.credit .val { color:#059669; }
        .summary-card.balance .val { color:#4b0082; }
        table.items { width:100%; border-collapse:collapse; margin-bottom:20px; border-radius:12px; overflow:hidden; border:1px solid #e2e8f0; }
        table.items thead { background:linear-gradient(135deg,#4b0082,#6e329b); }
        table.items thead th { padding:12px; color:#fbbf24; font-size:11px; font-weight:700; text-align:center; }
        table.items thead th:nth-child(1),table.items thead th:nth-child(2),table.items thead th:nth-child(3),table.items thead th:nth-child(7) { text-align:right; }
        table.items tbody tr:last-child td { border-bottom:none; }
        table.items tbody tr:nth-child(even) { background:#faf5ff; }
        table.items tbody td { padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; }
        .doc-footer { margin-top:24px; padding-top:14px; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; font-size:11px; color:#94a3b8; }
        .doc-footer .brand { font-weight:800; color:#5d198e; font-size:13px; }
        .print-btn { position:fixed; bottom:20px; left:20px; padding:12px 24px; background:#4b0082; color:#fbbf24; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:0 4px 12px rgba(75,0,130,0.3); }
        .print-btn:hover { background:#5d198e; }
        .loading-state { text-align:center; padding:80px 20px; }
        .loading-state .spinner { width:48px; height:48px; border:4px solid #e9d5ff; border-top-color:#5d198e; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-state p { font-size:16px; color:#64748b; }
        .error-state { text-align:center; padding:80px 20px; }
        .error-state .icon { width:64px; height:64px; margin:0 auto 16px; background:#fef2f2; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .error-state .icon i { font-size:28px; color:#dc2626; }
        .error-state h2 { font-size:20px; font-weight:800; color:#1e293b; margin-bottom:8px; }
        .error-state p { font-size:14px; color:#64748b; }
    </style>
</head>
<body>

<div id="loading" class="loading-state">
    <div class="spinner"></div>
    <p>جاري تحميل كشف الحساب...</p>
</div>

<div id="error" class="error-state" style="display:none">
    <div class="icon"><i>&#9888;</i></div>
    <h2 id="error-title">تعذر تحميل كشف الحساب</h2>
    <p id="error-msg">الرجاء التأكد من صحة الرابط</p>
</div>

<div id="content" style="display:none">
    <div class="doc-container">
        <div class="header">
            <div class="logo-section">
                <img id="logo-img" src="/images/logo.png" alt="G.PACK Logo" onerror="this.style.display='none'">
                <div class="logo-text">
                    <h1>G.PACK</h1>
                    <p>حلول التعبئة والتغليف</p>
                    <p>ينبع، المملكة العربية السعودية</p>
                </div>
            </div>
            <div class="doc-meta">
                <div class="doc-title">كشف حساب</div>
                <div class="doc-date" id="gen-date"></div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item"><label>الاسم</label><span id="client-name">—</span></div>
            <div class="info-item"><label>الهاتف</label><span id="client-phone">—</span></div>
            <div class="info-item"><label>المدينة</label><span id="client-city">—</span></div>
            <div class="info-item"><label>تاريخ الإصدار</label><span id="gen-time">—</span></div>
        </div>

        <div class="summary-grid">
            <div class="summary-card debit"><label>إجمالي مدين (عليه)</label><div class="val" id="total-debit">0.00</div></div>
            <div class="summary-card credit"><label>إجمالي دائن (له)</label><div class="val" id="total-credit">0.00</div></div>
            <div class="summary-card balance"><label>الرصيد الحالي</label><div class="val" id="balance">0.00</div></div>
        </div>

        <table class="items">
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>الوثيقة</th>
                    <th>الرقم</th>
                    <th>مدين</th>
                    <th>دائن</th>
                    <th>الرصيد</th>
                    <th>ملاحظات</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>

        <div class="doc-footer">
            <span class="brand">G.PACK ERP 2.0</span>
            <span>تم إنشاء هذا الكشف إلكترونياً بتاريخ <span id="footer-date"></span></span>
        </div>
    </div>
    <button class="print-btn no-print" onclick="window.print()">🖨️ طباعة</button>
</div>

<script>
(function() {
    const fmt = (n) => Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const esc = (s) => { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

    function showError(title, msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-title').textContent = title || 'تعذر تحميل كشف الحساب';
        document.getElementById('error-msg').textContent = msg || 'الرجاء التأكد من صحة الرابط';
    }

    function renderStatement(data) {
        const client = data.client || {};
        const summary = data.summary || {};
        const transactions = data.transactions || [];

        document.getElementById('client-name').textContent = client.name || '—';
        document.getElementById('client-phone').textContent = client.phone || '—';
        document.getElementById('client-city').textContent = client.city || '—';

        const genDate = data.generated_at ? new Date(data.generated_at) : new Date();
        document.getElementById('gen-date').textContent = genDate.toLocaleDateString('en-GB');
        document.getElementById('gen-time').textContent = genDate.toLocaleDateString('en-GB') + ' ' + genDate.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('footer-date').textContent = genDate.toLocaleDateString('en-GB');

        document.getElementById('total-debit').textContent = fmt(summary.total_invoices || summary.total_debit || 0);
        document.getElementById('total-credit').textContent = fmt(summary.total_payments || summary.total_credit || 0);
        document.getElementById('balance').textContent = fmt(summary.balance || 0);

        const tbody = document.getElementById('tbody');
        if (transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#94a3b8">لا توجد حركات</td></tr>';
        } else {
            tbody.innerHTML = transactions.map(function(t) {
                var debit = parseFloat(t.debit || 0);
                var credit = parseFloat(t.credit || 0);
                var balance = parseFloat(t.running_balance || 0);
                return '<tr>' +
                    '<td style="text-align:right;color:#64748b">' + new Date(t.trans_date).toLocaleDateString('en-GB') + '</td>' +
                    '<td style="text-align:right;font-weight:600;color:#1e293b">' + esc(t.document_type) + '</td>' +
                    '<td style="text-align:right;font-family:monospace;font-weight:700;color:#334155">#' + esc(t.document_number) + '</td>' +
                    '<td style="text-align:center;font-weight:700;color:' + (debit > 0 ? '#dc2626' : '#cbd5e1') + '">' + (debit > 0 ? fmt(debit) : '-') + '</td>' +
                    '<td style="text-align:center;font-weight:700;color:' + (credit > 0 ? '#059669' : '#cbd5e1') + '">' + (credit > 0 ? fmt(credit) : '-') + '</td>' +
                    '<td style="text-align:center;font-weight:800;color:' + (balance > 0 ? '#dc2626' : balance < 0 ? '#059669' : '#64748b') + '">' + fmt(balance) + '</td>' +
                    '<td style="color:#94a3b8">' + esc(t.notes || '') + '</td>' +
                '</tr>';
            }).join('');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client');
        const token = params.get('t');

        if (!clientId || !token) {
            showError('رابط غير صحيح', 'الرابط لا يحتوي على بيانات كافية');
            return;
        }

        try {
            const res = await fetch('/api/public/client-statement/' + clientId + '?t=' + encodeURIComponent(token));
            if (!res.ok) {
                const errData = await res.json().catch(function() { return {}; });
                showError('تعذر التحميل', errData.error || 'حدث خطأ أثناء تحميل كشف الحساب');
                return;
            }
            const data = await res.json();
            renderStatement(data);
        } catch (err) {
            showError('خطأ في الاتصال', 'تعذر الاتصال بالخادم. الرجاء المحاولة لاحقاً');
        }
    }

    init();
})();
</script>
</body>
</html>
