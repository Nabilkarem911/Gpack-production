server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: allow Tailwind CDN (needs unsafe-eval for JIT), Font Awesome, Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self';" always;

    location = /public-quotation.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location = /public-invoice.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for JS and HTML so SPA view updates are always fresh
    location ~* \.(js|html)$ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 200M;
    }

    # Proxy uploaded files (designs, etc.) to backend static folder
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
