server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP: unsafe-eval required by Tailwind CDN JIT mode; unsafe-inline required by inline scripts/styles
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self';" always;

    # Serve robots.txt as static file (do not fall back to index.html)
    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location = /public-quotation.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location = /public-invoice.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for JS and HTML so SPA view updates are always fresh
    location ~* \.(js|html)$ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Cache static assets (images, fonts, icons)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /api/ {
        proxy_pass http://gpack-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 200M;
    }

    # Proxy uploaded files (designs, etc.) to backend static folder
    # Use ^~ so this block takes precedence over the static asset regex above
    location ^~ /uploads/ {
        proxy_pass http://gpack-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
